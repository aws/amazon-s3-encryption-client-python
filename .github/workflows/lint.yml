name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Uv
        run: pip install uv
          
      - name: Create virtual environment
        run: uv venv
          
      - name: Install dependencies
        run: uv pip install -e ".[dev,test]"
        
      - name: Run Black
        run: uv run black --check .
        
      - name: Run isort
        run: uv run isort --check .
        
      - name: Run Ruff
        # Allow ruff to fail for now as we're gradually adopting linting standards
        run: uv run ruff check src/ test/ || true
