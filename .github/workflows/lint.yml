name: Lint

on:
  push:
    branches: [ main ]
  workflow_call:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Uv
        run: pip install uv
          
      - name: Install dependencies and run linting
        run: |
          make install
          make lint
