name: Run Tests

on:
  workflow_call:
    # Optional inputs that can be provided when calling this workflow

jobs:
  test:
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: read
      pages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PAT_FOR_PRIVATE_RUBY }}
      
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Clone duvet repository  
        run: git clone https://github.com/awslabs/duvet.git /tmp/duvet

      - name: Build and install duvet
        run: |
          cd /tmp/duvet
          cargo xtask build
          cargo install --path ./duvet

      - name: Run duvet
        if: always()
        run: cd test-server && make duvet

      - name: Upload duvet reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          include-hidden-files: true
          path: test-server/*-server/.duvet/reports/report.html

      - name: Generate compliance dashboard
        if: always()
        run: |
          cd test-server/spec-compliance-dashboard
          python generate_compliance_dashboard.py

      - name: Upload compliance dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-dashboard
          include-hidden-files: true
          path: |
            test-server/spec-compliance-dashboard/compliance_homepage.html
            test-server/*/compliance_summary_report.html
            test-server/*/.duvet/reports/report.html
            test-server/spec-compliance-dashboard/templates/*

      - name: Setup Pages
        # if: github.ref == 'refs/heads/fireegg-test-servers' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Prepare Pages content
        if: always()
        run: |
          mkdir -p pages-staging/spec-compliance-dashboard/templates
          
          # Copy homepage to root for GitHub Pages
          cp test-server/spec-compliance-dashboard/compliance_homepage.html pages-staging/index.html
          
          # Copy templates
          cp test-server/spec-compliance-dashboard/templates/* pages-staging/spec-compliance-dashboard/templates/
          
          # Copy server reports and duvet reports
          for server_dir in test-server/*-server; do
            if [ -d "$server_dir" ]; then
              server_name=$(basename "$server_dir")
              mkdir -p "pages-staging/$server_name/.duvet/reports"
              
              # Copy compliance summary report if it exists
              if [ -f "$server_dir/compliance_summary_report.html" ]; then
                cp "$server_dir/compliance_summary_report.html" "pages-staging/$server_name/"
              fi
              
              # Copy duvet report if it exists
              if [ -f "$server_dir/.duvet/reports/report.html" ]; then
                cp "$server_dir/.duvet/reports/report.html" "pages-staging/$server_name/.duvet/reports/"
              fi
            fi
          done

      - name: Upload Pages artifact
        # if: github.ref == 'refs/heads/fireegg-test-servers' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-staging/

      - name: Deploy to GitHub Pages
        # if: github.ref == 'refs/heads/fireegg-test-servers' && github.event_name == 'push'
        uses: actions/deploy-pages@v4
