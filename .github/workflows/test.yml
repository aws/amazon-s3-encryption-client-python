name: Run Tests

on:
  workflow_call:
    # Optional inputs that can be provided when calling this workflow
    inputs:
      python-version:
        description: "Python version to use"
        default: "3.11"
        required: false
        type: string

jobs:
  test:
    runs-on: macos-14
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true
          # This is Ryan Emery's (seebees) PAT.
          # To grant this workflow access to a new private repo,
          # ask Ryan to edit this PAT's permissions to add access to a new private repo.
          token: ${{ secrets.PAT_FOR_PRIVATE_RUBY }}

      - name: Checkout CPP code
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.PAT_FOR_CPP }}
          repository: awslabs/aws-sdk-cpp-staging
          ref: fire-egg-dev
          path: test-server/cpp-v2-transition-server/aws-sdk-cpp/

      - name: Checkout .NET V2 code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_FOR_DOTNET }}
          repository: aws/private-amazon-s3-encryption-client-dotnet-staging
          # This is the branch for S3EC .NET V2
          ref: rishav/addECperRequestS3ECV2 
          path: test-server/net-v2-v3-server/s3ec-net-v2/

      - name: Checkout .NET V3 code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_FOR_DOTNET }}
          repository: aws/private-amazon-s3-encryption-client-dotnet-staging
          # This is the branch for S3EC .NET V3
          ref: rishav/addECperRequest
          path: test-server/net-v2-v3-server/s3ec-net-v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.11' }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Set up PHP with Composer
        uses: shivammathur/setup-php@verbose
        with:
          php-version: "8.1"

      - name: Install PHP V2 dependencies
        working-directory: ./test-server/php-v2-server
        shell: bash
        run: composer install

      - name: Install PHP V2 Transition dependencies
        working-directory: ./test-server/php-v2-transition-server
        shell: bash
        run: composer install

      - name: Install PHP V3 dependencies
        working-directory: ./test-server/php-v3-server
        shell: bash
        run: composer install

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25

      # Cache uv dependencies
      - name: Cache uv dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install Uv
        run: pip install uv

      # Cache Gradle dependencies and build outputs
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            test-server/java-v3-server/.gradle
            test-server/java-tests/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('test-server/java-v3-server/**/*.gradle*', 'test-server/java-tests/**/gradle-wrapper.properties', 'test-server/java-tests/**/*.gradle*', 'test-server/java-v3-server/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: make install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::370957321024:role/S3EC-Python-Github-test-role
          aws-region: us-west-2

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        run: make test-integration
        env:
          CI_S3_BUCKET: ${{ vars.CI_S3_BUCKET }}
          CI_KMS_KEY_ALIAS: ${{ vars.CI_KMS_KEY_ALIAS }}

      - name: Run test-server tests
        run: cd test-server && make ci
        env:
          AWS_REGION: us-west-2
          TEST_SERVER_S3_BUCKET: ${{ vars.TEST_SERVER_S3_BUCKET }}
          TEST_SERVER_KMS_KEY_ARN: ${{ vars.TEST_SERVER_KMS_KEY_ARN }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dtest.filter.servers=java,python,go,net,cpp,php"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: test-server/java-tests/build/reports/tests/integ
